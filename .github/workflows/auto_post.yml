name: DMMアフィリエイト Instagram 自動投稿

on:
  schedule:
    - cron: '0 0,4,8,12,16,20 * * *'

  workflow_dispatch:
    inputs:
      post_index:
        description: '投稿する商品番号（0始まり）'
        required: false
        default: '0'
      post_all:
        description: '全件投稿する場合は true'
        required: false
        default: 'false'
      dmm_floor:
        description: 'DMMフロア（videoa / videoc / anime / doujin / comic / goods）'
        required: false
        default: 'videoa'
      dmm_sort:
        description: 'ソート順（-date / rank / -price）'
        required: false
        default: '-date'

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v5

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 依存ライブラリをインストール
        run: |
          pip install requests pillow

      - name: 🔍 DMM API デバッグ確認
        env:
          DMM_API_ID:       ${{ secrets.DMM_API_ID }}
          DMM_AFFILIATE_ID: ${{ secrets.DMM_AFFILIATE_ID }}
        run: |
          python - <<'PYEOF'
          import os, requests, json

          api_id       = os.environ.get('DMM_API_ID', '')
          affiliate_id = os.environ.get('DMM_AFFILIATE_ID', '')

          print(f"API_ID末尾3文字: ...{api_id[-3:] if api_id else '★未設定★'}")
          print(f"AFFILIATE_ID末尾6文字: ...{affiliate_id[-6:] if affiliate_id else '★未設定★'}")

          params = {
              'api_id':       api_id,
              'affiliate_id': affiliate_id,
              'site':         'FANZA',
              'service':      'digital',
              'floor':        'videoa',
              'hits':         3,
              'sort':         '-date',
              'output':       'json',
          }
          resp = requests.get('https://api.dmm.com/affiliate/v3/ItemList', params=params, timeout=15)
          print(f"HTTPステータス: {resp.status_code}")
          print(json.dumps(resp.json(), ensure_ascii=False, indent=2)[:2000])
          PYEOF

      - name: DMMアフィリエイト Instagram 自動投稿を実行
        env:
          META_ACCESS_TOKEN:    ${{ secrets.META_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          IMGBB_API_KEY:        ${{ secrets.IMGBB_API_KEY }}
          DMM_API_ID:           ${{ secrets.DMM_API_ID }}
          DMM_AFFILIATE_ID:     ${{ secrets.DMM_AFFILIATE_ID }}
          POST_INDEX:  ${{ github.event.inputs.post_index  || '0' }}
          POST_ALL:    ${{ github.event.inputs.post_all    || 'false' }}
          DMM_FLOOR:   ${{ github.event.inputs.dmm_floor   || 'videoa' }}
          DMM_SORT:    ${{ github.event.inputs.dmm_sort    || '-date' }}
        run: python main.py
