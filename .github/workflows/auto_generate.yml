name: DMM X投稿文ジェネレーター

on:
  workflow_dispatch:
    inputs:
      post_start_index:
        description: '取得開始番号（1始まり）例: 1→1〜20件目, 21→21〜40件目'
        required: true
        default: '1'
        type: number
      dmm_sort_mode:
        description: 'ソートモード'
        required: false
        default: 'both'
        type: choice
        options:
          - both   # 新着20件＋人気20件（デフォルト・推奨）
          - date   # 新着順のみ20件
          - rank   # 人気順のみ20件
      dmm_floor:
        description: 'フロア種別'
        required: false
        default: 'videoa'
        type: choice
        options:
          - videoa
          - videoc
          - anime
          - doujin
          - comic
          - goods

  # スケジュール実行：毎日 JST 9:00 に新着＋人気の両方を自動生成
  schedule:
    - cron: '0 0 * * *'   # UTC 0:00 = JST 9:00

jobs:
  generate-posts:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: pip install requests

      - name: X投稿文を生成
        env:
          DMM_API_ID:       ${{ secrets.DMM_API_ID }}
          DMM_AFFILIATE_ID: ${{ secrets.DMM_AFFILIATE_ID }}
          POST_START_INDEX: ${{ github.event.inputs.post_start_index || '1' }}
          # both=新着20件+人気20件、スケジュール実行時もbothをデフォルトに
          DMM_SORT_MODE:    ${{ github.event.inputs.dmm_sort_mode || 'both' }}
          DMM_FLOOR:        ${{ github.event.inputs.dmm_floor || 'videoa' }}
        run: python dmm_x_post_generator.py

      - name: 生成ファイルをアーティファクトとしてアップロード
        uses: actions/upload-artifact@v4
        with:
          name: dmm_x_posts_${{ github.run_number }}
          path: dmm_x_posts_*.txt
          retention-days: 7
